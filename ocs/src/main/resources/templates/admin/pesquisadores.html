<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Admin - OCS.EUC</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #333;
            line-height: 1.6;
        }

        header {
            background: #1b3a57;
            color: white;
            padding: 20px;
        }

        .header-top {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            gap: 15px;
        }

        .header-top h1 {
            grid-column: 2;
            margin: 0;
            text-align: center;
            font-size: 1.6rem;
        }

        .auth-area {
            grid-column: 3;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 15px;
        }

        .btn-logout {
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.25s ease;
            cursor: pointer;
            border: none;
            background: #fbeaea;
            color: #b00020;
        }

       nav {
            background: #153049;
            padding: 15px 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            border: 1px solid #e6eef6;
            box-sizing: border-box;
            overflow-x: auto;
        }

        h2 {
            color: #1b3a57;
            margin-top: 0;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-size: 1.6rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            background: #f8fbfe;
            color: #1b3a57;
            text-align: left;
            padding: 15px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e6eef6;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f4f8;
            font-size: 0.9rem;
            color: #555;
        }

        tr:hover {
            background-color: #fcfdfe;
        }

        .btn-acoes {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn-table {
            padding: 8px 14px;
            border-radius: 14px;
            font-size: 0.75rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-aprovar {
            background: #e7f3e8;
            color: #2e7d32;
        }

        .btn-aprovar:hover {
            background: #2e7d32;
            color: white;
        }

        .btn-rejeitar {
            background: #fbeaea;
            color: #b00020;
        }

        .btn-rejeitar:hover {
            background: #b00020;
            color: white;
        }

        .msg-vazia {
            text-align: center;
            padding: 50px;
            color: #999;
            font-style: italic;
        }

        footer {
            background: #1b3a57;
            color: white;
            padding: 30px;
            text-align: center;
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            .header-top {
                display: flex;
                flex-direction: column;
                text-align: center;
            }

            .header-top h1 {
                font-size: 1.3rem;
                order: 1;
            }

            .auth-area {
                order: 2;
                justify-content: center;
                width: 100%;
                margin-top: 10px;
            }

            .container {
                margin: 20px 10px;
                padding: 20px;
            }


        }
           footer {
            background: #1b3a57;
            color: white;
            padding: 30px;
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>

<body>

<header>
    <div class="header-top">
        <div class="admin-area"></div>
        <h1>OCS.EUC - Observatório da Comunidade Surda</h1>

    </div>
</header>

<nav>
    <a th:href="@{/}">Página Principal</a>
</nav>

<div class="container">
    <h2>Validação de Novos Pesquisadores</h2>

    <table>
        <thead>
        <tr>
            <th>Nome do Solicitante</th>
            <th>E-mail</th>
            <th>Instituição / Vínculo</th>
            <th style="text-align: center;">Decisão</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${pesquisadores}">
            <td th:text="${p.nome}" style="font-weight: bold; color: #1b3a57;"></td>
            <td th:text="${p.email}"></td>
            <td th:text="${p.instituicao != null && !p.instituicao.isEmpty() ? p.instituicao : 'Não informada'}"></td>
            <td>
                <div class="btn-acoes">
                    <form th:action="@{/admin/pesquisadores/{id}/aprovar(id=${p.id})}" method="post">
                        <button type="submit" class="btn-table btn-aprovar">Aprovar</button>
                    </form>

                    <form th:action="@{/admin/pesquisadores/{id}/rejeitar(id=${p.id})}" method="post">
                        <button type="submit" class="btn-table btn-rejeitar">Rejeitar</button>
                    </form>
                </div>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(pesquisadores)}">
            <td colspan="4" class="msg-vazia">
                Não há pedidos de cadastro pendentes no momento.
            </td>
        </tr>
        </tbody>
    </table>
</div>

<footer>
    <p>© 2026 Observatório da Comunidade Surda — IFBA Euclides da Cunha</p>
</footer>

<div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
</div>
<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>

</body>
</html>
