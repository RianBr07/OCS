<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autoras - OCS.EUC</title>

  <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f7f7f7;
        color: #333;
        line-height: 1.6;
    }

    header {
        background: #1b3a57;
        color: white;
        padding: 20px;
    }

    .header-top {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        max-width: 1200px;
        margin: 0 auto;
        gap: 15px;
    }

    .header-top h1 {
        grid-column: 2;
        margin: 0;
        text-align: center;
        font-size: 1.6rem;
    }

    .auth-area {
        grid-column: 3;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 15px;
    }

    .user-info {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        font-size: 0.8rem;
    }

    .roles {
        display: flex;
        gap: 5px;
        margin-top: 3px;
    }

    .roles span {
        background: #2d5f8b;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 0.65rem;
        font-weight: bold;
    }

    .btn-entrar, .btn-cadastrar-header, .btn-logout, .btn-admin {
        text-decoration: none;
        padding: 8px 18px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 0.85rem;
        transition: all 0.25s ease;
        cursor: pointer;
        border: none;
        display: inline-block;
        text-align: center;
    }

    .btn-entrar {
        color: white;
        border: 2px solid white;
        background: transparent;
    }

    .btn-entrar:hover { background: white; color: #1b3a57; }
    .btn-cadastrar-header { background: #2d5f8b; color: white; }
    .btn-logout { background: #fbeaea; color: #b00020; }
    .btn-admin { background: #e6eef6; color: #1b3a57; }

     nav {
            background: #153049;
            padding: 15px 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

    .container {
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 20px;
        box-sizing: border-box;
    }

    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        flex-wrap: wrap;
        gap: 15px;
    }

    h2 {
        color: #1b3a57;
        margin: 0;
        font-size: 1.8rem;
    }

    .btn-action-main {
        background: #1b3a57;
        color: white;
        padding: 10px 22px;
        border-radius: 20px;
        text-decoration: none;
        font-weight: bold;
        font-size: 0.9rem;
        transition: all 0.25s ease;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .btn-action-main:hover {
        background: #153049;
        transform: translateY(-2px);
    }

    .autoras-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
    }

    .autora-card {
        background: white;
        padding: 25px;
        border-radius: 14px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.06);
        transition: all 0.25s ease;
        border: 1px solid transparent;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .autora-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(27, 58, 87, 0.12);
        border-color: #e6eef6;
    }

    .autora-info p {
        margin: 6px 0;
        font-size: 0.95rem;
        color: #555;
    }

    .autora-info strong {
        color: #1b3a57;
    }

    .acoes {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        border-top: 1px solid #f0f0f0;
        padding-top: 15px;
    }

    .btn-editar {
        background: #e6eef6;
        color: #1b3a57;
        padding: 8px 15px;
        border-radius: 15px;
        font-size: 0.8rem;
        font-weight: bold;
        text-decoration: none;
        flex: 1;
        text-align: center;
    }

    .btn-excluir {
        background: #fbeaea;
        color: #b00020;
        padding: 8px 15px;
        border-radius: 15px;
        font-size: 0.8rem;
        font-weight: bold;
        border: none;
        cursor: pointer;
        flex: 1;
    }

    .alerta-erro {
        background-color: #fbeaea;
        color: #b00020;
        border: 1px solid #f5c2c7;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 25px;
        font-weight: bold;
        text-align: center;
    }

    footer {
        background: #1b3a57;
        color: white;
        padding: 30px;
        text-align: center;
        margin-top: 60px;
    }

    @media (max-width: 768px) {
        .header-top {
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .header-top h1 {
            font-size: 1.3rem;
            order: 1;
        }

        .auth-area {
            order: 2;
            justify-content: center;
            flex-direction: column;
            width: 100%;
        }

        .user-info {
            align-items: center;
            margin-bottom: 10px;
        }

        .section-header {
            flex-direction: column;
            text-align: center;
        }

        .btn-action-main {
            width: 100%;
            box-sizing: border-box;
        }


    }

    .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin: 40px 0;
    flex-wrap: wrap;
}

.pagination a, .pagination span {
    display: inline-block;
    padding: 10px 16px;
    border-radius: 8px;
    text-decoration: none;
    background: white;
    color: #1b3a57;
    border: 1px solid #ddd;
    font-weight: bold;
    transition: all 0.2s;
}

.pagination a:hover:not(.disabled):not(.active) {
    background: #eef3f7;
}

.pagination a.active {
    background: #1b3a57 !important;
    color: white !important;
    border-color: #1b3a57;
}

.pagination a.disabled {
    color: #ccc !important;
    border-color: #eee !important;
    background: #fafafa !important;
    cursor: not-allowed;
    pointer-events: none;
}
       footer {
            background: #1b3a57;
            color: white;
            padding: 30px;
            text-align: center;
            margin-top: 60px;
        }
  </style>
</head>

<body>

<header>
  <div class="header-top">
    <div class="admin-area">
      <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/pesquisadores}" class="btn-admin">
        Pendências Admin
      </a>
    </div>

    <h1>OCS.EUC - Observatório da Comunidade Surda</h1>

    <div class="auth-area">
      <div sec:authorize="isAuthenticated()" class="user-info">
        <span>Olá, <strong th:text="${#authentication.principal.conta.nome}"></strong></span>
        <div class="roles">
          <span sec:authorize="hasRole('ADMIN')">ADMIN</span>
          <span sec:authorize="hasRole('PESQUISADOR')">PESQUISADOR</span>
        </div>
      </div>

      <div class="auth-buttons">
        <div sec:authorize="!isAuthenticated()" style="display:flex; gap:10px; flex-wrap: wrap; justify-content: center;">
          <a th:href="@{/login}" class="btn-entrar">Entrar</a>
          <a th:href="@{/contas/nova}" class="btn-cadastrar-header">Cadastrar</a>

    </div>
  </div>
</header>

<nav>
  <a th:href="@{/}">Página Principal</a>
</nav>

<div class="container">
  <div class="section-header">
    <h2>Corpo de Pesquisadores</h2>
    <a th:href="@{/autoras/cadastrar}" class="btn-action-main">+ Cadastrar Autora</a>
  </div>

  <div th:if="${erro}" class="alerta-erro" th:text="${erro}"></div>

  <div class="autoras-grid">
    <div class="autora-card" th:each="a : ${autoras}">
      <div class="autora-info">
        <p><strong>Nome:</strong> <span th:text="${a.nome}"></span></p>
        <p><strong>E-mail:</strong> <span th:text="${a.email != null ? a.email : 'Não informado'}"></span></p>
        <p><strong>Instituição:</strong> <span th:text="${a.instituicao != null ? a.instituicao : '—'}"></span></p>
      </div>

      <div class="acoes">
        <a th:href="@{/autoras/editar/{id}(id=${a.id})}" class="btn-editar">Editar Perfil</a>
        <form th:action="@{/autoras/excluir/{id}(id=${a.id})}" method="post" style="flex: 1;">
          <button type="submit" class="btn-excluir">Excluir</button>
        </form>
      </div>
    </div>
  </div>
  <div class="pagination" th:if="${totalPaginas > 1}">
    <a th:href="@{/autoras/listar(page=${paginaAtual - 1})}"
       th:classappend="${paginaAtual == 0} ? 'disabled' : ''">&laquo;</a>

    <span th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}">
        <a th:href="@{/autoras/listar(page=${i})}"
           th:text="${i + 1}"
           th:classappend="${i == paginaAtual} ? 'active' : ''"></a>
    </span>

    <a th:href="@{/autoras/listar(page=${paginaAtual + 1})}"
       th:classappend="${paginaAtual + 1 == totalPaginas} ? 'disabled' : ''">&raquo;</a>
  </div>
</div>



<footer>
  <p>© 2026 Observatório da Comunidade Surda — IFBA Euclides da Cunha</p>
</footer>

<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
</div>
<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>

</body>
</html>
