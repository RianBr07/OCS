<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastrar Autora - OCS.EUC</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #333;
            line-height: 1.6;
        }

        header {
            background: #1b3a57;
            color: white;
            padding: 20px;
        }

        .header-top {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            gap: 15px;
        }

        .header-top h1 {
            grid-column: 2;
            margin: 0;
            text-align: center;
            font-size: 1.6rem;
        }

        .auth-area {
            grid-column: 3;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 15px;
        }

        .btn-logout {
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.25s ease;
            cursor: pointer;
            border: none;
            background: #fbeaea;
            color: #b00020;
        }

        nav {
            background: #153049;
            padding: 15px 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            border: 1px solid #e6eef6;
            box-sizing: border-box;
        }

        h2 {
            color: #1b3a57;
            margin-top: 0;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.6rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-top: 18px;
            font-weight: bold;
            color: #1b3a57;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #e6eef6;
            box-sizing: border-box;
            background-color: #fcfdfe;
            transition: all 0.2s;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #1b3a57;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(27, 58, 87, 0.05);
        }

        .btn-group {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 1rem;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
        }

        .btn-primary {
            background: #1b3a57;
            color: white;
        }

        .btn-primary:hover {
            background: #153049;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(21, 48, 73, 0.2);
        }

        .btn-secondary {
            background: #e6eef6;
            color: #1b3a57;
        }

        .btn-secondary:hover {
            background: #dbe7f2;
        }

        footer {
            background: #1b3a57;
            color: white;
            padding: 30px;
            text-align: center;
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            .header-top {
                display: flex;
                flex-direction: column;
                text-align: center;
            }

            .header-top h1 {
                font-size: 1.3rem;
                order: 1;
            }

            .auth-area {
                order: 2;
                justify-content: center;
                width: 100%;
                margin-top: 10px;
            }

            .container {
                margin: 20px 15px;
                padding: 25px;
            }


        }
           footer {
            background: #1b3a57;
            color: white;
            padding: 30px;
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>

<body>

<header>
    <div class="header-top">
        <div class="admin-area"></div>
        <h1>OCS.EUC - Observatório da Comunidade Surda</h1>

    </div>
</header>

<nav>
    <a th:href="@{/}">Página Principal</a>
</nav>

<div class="container">
    <h2>Cadastrar Autora</h2>
    <p class="subtitle">Adicione novas pesquisadoras e colaboradores ao sistema</p>

    <form th:action="@{/autoras}" th:object="${autora}" method="post">

        <input type="hidden" name="voltar" th:value="${voltar}">

        <label>Nome Completo</label>
        <input type="text" th:field="*{nome}" required placeholder="Ex: Maria Silva">

        <label>E-mail</label>
        <input type="email" th:field="*{email}" placeholder="exemplo@email.com">

        <label>Instituição / Filiação</label>
        <input type="text" th:field="*{instituicao}" placeholder="Ex: IFBA, UFBA, etc.">

        <label>Link do Currículo Lattes</label>
        <input type="text" th:field="*{lattes}" placeholder="http://lattes.cnpq.br/...">

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">
                Salvar Registro
            </button>

            <a th:if="${voltar != null}"
               th:href="${voltar}"
               class="btn btn-secondary">
                ⬅ Voltar para o cadastro da obra
            </a>

        </div>
    </form>
</div>

<footer>
    <p>© 2026 Observatório da Comunidade Surda — IFBA Euclides da Cunha</p>
</footer>

<div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
</div>
<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>

</body>
</html>
